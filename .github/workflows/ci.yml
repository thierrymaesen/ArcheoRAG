name: ArchéoRAG CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Configurer Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Installer les dépendances
      run: pip install -r requirements.txt